server:
  port: 8082

spring:
  application:
    name: users-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/users_db}
    username: ${DB_USERNAME:medsync}
    password: ${DB_PASSWORD:medsync123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:medsync-super-secret-key-for-jwt-demo-1234567890}
  internal-token: ${INTERNAL_SERVICE_TOKEN:medsync-internal-token}
  seed:
    admin-email: ${ADMIN_EMAIL:admin@medsync.com}
    admin-password: ${ADMIN_PASSWORD:admin123}
