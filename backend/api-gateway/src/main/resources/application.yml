server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
            exposedHeaders: '*'
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: users-service
          uri: ${USERS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**

        - id: patients-service
          uri: ${PATIENTS_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/patients/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
