server:
  port: 8083

spring:
  application:
    name: patients-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/patients_db}
    username: ${DB_USERNAME:medsync}
    password: ${DB_PASSWORD:medsync123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:medsync-super-secret-key-for-jwt-demo-1234567890}
